# Databricks Apps manifest for the HL7 RTI dashboard.
# The app runs the Dash server (UI + in-process event generator). The generator
# writes bronze via Zerobus REST using the app service principal's OAuth creds,
# which Databricks Apps inject as DATABRICKS_CLIENT_ID / DATABRICKS_CLIENT_SECRET.
command:
  - gunicorn
  - app:server
  - --bind
  - 0.0.0.0:8000
  - --workers
  - "1"
  - --threads
  - "8"
  - --timeout
  - "120"

env:
  - name: INGEST_PATH
    value: zerobus
  - name: HL7_CATALOG
    value: real_time_mode_demo_catalog
  - name: HL7_SCHEMA
    value: rti_demo
  # Pin workspace identity for THIS workspace (fevm-real-time-mode-demo, us-east-1).
  # The Zerobus Direct Write endpoint is derived from workspace_id + region
  # (https://{workspace_id}.zerobus.{region}.cloud.databricks.com), so these must
  # be correct or sends fail. Do NOT rely on config.py defaults (they point at the
  # old workspace) or on the platform-injected bare DATABRICKS_HOST.
  - name: DATABRICKS_HOST
    value: https://fevm-real-time-mode-demo.cloud.databricks.com
  - name: DATABRICKS_WORKSPACE_ID
    value: "7474653348487172"
  - name: CLOUD_REGION
    value: us-east-1
  # Autoscaling Lakebase endpoint used to mint the short-lived OAuth password.
  # PGHOST/PGUSER/PGPORT/PGDATABASE are auto-injected by the attached `database`
  # app resource (never PGPASSWORD — the app mints it per connection).
  - name: ENDPOINT_NAME
    value: projects/rti-demo/branches/production/endpoints/primary
  # --- Event Hubs (Path B) --------------------------------------------------
  # The generator's KafkaSink produces to Event Hubs when the active path is
  # 'eventhub'. Bootstrap + topic are plain config; the connection string is a
  # SECRET, injected via valueFrom a secret scope (never inline). Create it once:
  #   databricks secrets create-scope hl7-rti
  #   databricks secrets put-secret hl7-rti eventhub_connection_string --string-value "<conn>"
  - name: EVENTHUB_BOOTSTRAP
    value: hl7-rti-demo-mj.servicebus.windows.net:9093
  - name: EVENTHUB_TOPIC
    value: hl7-events
  - name: EVENTHUB_CONNECTION_STRING
    valueFrom: eventhub_connection_string
