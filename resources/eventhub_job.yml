# Path B front door — the Event Hubs → bronze ingest job (spec section 5.1).
#
# A classic Structured Streaming job (Kafka source is NOT supported on serverless,
# and Real-Time Mode cannot write Delta — see the RTM express-lane memo). It reads
# the Event Hubs Kafka endpoint and appends to the SAME bronze_hl7_raw table
# Zerobus writes, so the serverless DLT medallion downstream is untouched and both
# paths converge to identical silver + Lakebase serving.
#
# Deployed PAUSED: it only needs to run while Path B (Event Hubs) is the active
# ingestion path in the app. Unpause when demoing Path B; pause to stop billing.
#
# The Event Hubs connection string is a SECRET — never inline it. It is injected
# as the EVENTHUB_CONNECTION_STRING env var from a Databricks secret scope:
#   databricks secrets create-scope hl7-rti
#   databricks secrets put-secret hl7-rti eventhub_connection_string --string-value "<conn>"

resources:
  jobs:
    hl7_eventhub_to_bronze:
      name: hl7-rti-eventhub-to-bronze
      tags:
        project: hl7-rti-demo
        managed-by: databricks-asset-bundle
        path: event-hub

      job_clusters:
        - job_cluster_key: eh_ingest
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            # Thin, single-purpose ingest — a small elastic cluster is plenty; the
            # broker (Event Hubs TUs) is Path B's scale ceiling, not this job.
            autoscale:
              min_workers: 1
              max_workers: 4
            spark_conf:
              spark.sql.adaptive.enabled: "true"
            spark_env_vars:
              BUNDLE_ROOT: ${workspace.file_path}
              HL7_CATALOG: ${var.catalog}
              HL7_SCHEMA: ${var.schema}
              EVENTHUB_BOOTSTRAP: ${var.eventhub_bootstrap}
              EVENTHUB_TOPIC: ${var.eventhub_topic}
              # Connection string from the secret scope (never inline).
              EVENTHUB_CONNECTION_STRING: "{{secrets/hl7-rti/eventhub_connection_string}}"
            custom_tags:
              project: hl7-rti-demo

      tasks:
        - task_key: eventhub_to_bronze
          job_cluster_key: eh_ingest
          spark_python_task:
            python_file: ${workspace.file_path}/pipelines/eventhub_to_bronze.py
          libraries:
            # Spark ↔ Kafka connector for the structured-streaming Kafka source.
            - maven:
                coordinates: org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0

      continuous:
        pause_status: PAUSED

      queue:
        enabled: true
